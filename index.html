<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDR Leaderboard — March 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inconsolata:wght@400;500;600&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f5f2eb;--border:#ddd9ce;--text:#1a1814;--muted:#9a9488;--faint:#e8e4db;--gold:#c8960a;--red:#c0392b;--green:#1a7a4a;--blue:#2980b9;--r1:#c8960a;--r2:#7a7a7a;--r3:#9a6030;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px 14px;}
.wrap{max-width:900px;margin:0 auto;}
.header{border-bottom:3px solid var(--text);padding-bottom:16px;margin-bottom:20px;}
.eyebrow{font-family:'Inconsolata',monospace;font-size:11px;letter-spacing:.3em;color:var(--muted);margin-bottom:4px;}
.header-row{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:8px;}
h1{font-family:'Oswald',sans-serif;font-size:clamp(32px,8vw,62px);font-weight:700;line-height:1;}
h1 span{color:var(--gold);}
.header-right{text-align:right;font-family:'Inconsolata',monospace;font-size:11px;color:var(--muted);line-height:1.8;}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:6px;margin-bottom:6px;}
.mc{background:var(--text);padding:18px 20px;position:relative;overflow:hidden;}
.mc-top{position:absolute;top:0;left:0;right:0;height:3px;}
.mc-lbl{font-family:'Inconsolata',monospace;font-size:10px;letter-spacing:.2em;color:rgba(255,255,255,.45);margin-bottom:8px;}
.mc-val{font-family:'Oswald',sans-serif;font-size:clamp(26px,5vw,38px);font-weight:700;color:#fff;line-height:1;}
.pace{background:#f0ece3;border:1px solid var(--border);padding:16px 20px;margin-bottom:24px;}
.pace-lbl{font-family:'Inconsolata',monospace;font-size:11px;letter-spacing:.22em;color:var(--muted);margin-bottom:8px;}
.pace-row{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;margin-bottom:10px;}
.pace-title{font-family:'Oswald',sans-serif;font-size:clamp(16px,3.5vw,22px);font-weight:600;}
.pace-stats{display:flex;gap:24px;flex-wrap:wrap;}
.ps-val{font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;color:var(--gold);display:block;}
.ps-lbl{font-family:'Inconsolata',monospace;font-size:10px;letter-spacing:.15em;color:var(--muted);}
.pbar-bg{height:6px;background:var(--faint);border-radius:2px;}
.pbar-fg{height:100%;border-radius:2px;background:linear-gradient(90deg,#7a5808,var(--gold));}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;}
.tab{cursor:pointer;background:transparent;border:none;border-bottom:3px solid transparent;font-family:'Inconsolata',monospace;font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;padding:10px 16px;color:var(--muted);transition:all .15s;margin-bottom:-1px;}
.tab:hover,.tab.on{color:var(--text);}.tab.on{border-bottom-color:var(--gold);}
.sec{display:none;}.sec.on{display:block;}
@keyframes ri{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.rr{border-bottom:1px solid var(--faint);padding:14px 0;display:grid;grid-template-columns:44px 1fr 60px;gap:0 12px;animation:ri .35s ease forwards;opacity:0;}
.rrank{font-family:'Oswald',sans-serif;font-size:26px;font-weight:700;line-height:1;padding-top:4px;}
.rname{font-family:'Oswald',sans-serif;font-size:22px;font-weight:600;margin-bottom:6px;line-height:1;}
.pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;}
.pill{background:var(--faint);border-left:2px solid;padding:4px 10px;border-radius:0 2px 2px 0;}
.pv{font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;color:var(--text);}
.pl{font-family:'Inconsolata',monospace;font-size:9px;color:var(--muted);margin-left:5px;letter-spacing:.1em;}
.sbar-bg{height:5px;background:var(--faint);border-radius:2px;}
.sbar-fg{height:100%;border-radius:2px;}
.rgap{font-family:'Inconsolata',monospace;font-size:11px;margin-top:5px;}
.rscore{font-family:'Oswald',sans-serif;font-size:32px;font-weight:700;line-height:1;text-align:right;}
.rslbl{font-family:'Inconsolata',monospace;font-size:9px;color:var(--muted);letter-spacing:.15em;margin-top:3px;text-align:right;}
.footer{border-top:1px solid var(--border);margin-top:36px;padding-top:14px;display:flex;justify-content:space-between;align-items:center;}
.fl{font-family:'Inconsolata',monospace;font-size:11px;color:var(--muted);letter-spacing:.15em;}
.fr{font-family:'Oswald',sans-serif;font-size:15px;color:var(--muted);letter-spacing:.1em;}

/* TEAMS */
.ts-header{display:grid;grid-template-columns:36px 1fr 110px 80px 80px 90px;gap:0 8px;padding:9px 14px;background:var(--text);font-family:'Inconsolata',monospace;font-size:10px;letter-spacing:.15em;color:rgba(255,255,255,.45);}
.ts-row{display:grid;grid-template-columns:36px 1fr 110px 80px 80px 90px;gap:0 8px;padding:12px 14px;border-bottom:1px solid var(--faint);animation:ri .35s ease forwards;opacity:0;align-items:center;}
.ts-rank{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;}
.ts-name{font-family:'Oswald',sans-serif;font-size:17px;font-weight:600;}
.ts-reps{font-family:'Inconsolata',monospace;font-size:10px;color:var(--muted);margin-top:2px;}
.ts-val{font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;text-align:right;}
.ts-score{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;text-align:right;}
.team-cards{display:grid;gap:14px;margin-top:24px;}
.tc{border:1px solid var(--border);overflow:hidden;animation:ri .4s ease forwards;opacity:0;}
.tc-head{background:var(--text);color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;}
.tc-head-left{}
.tc-title{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;}
.tc-badge{font-family:'Inconsolata',monospace;font-size:10px;letter-spacing:.2em;color:rgba(255,255,255,.4);margin-top:3px;}
.tc-totals{display:flex;gap:20px;flex-wrap:wrap;}
.tc-tot{text-align:right;}
.tc-tot-val{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:var(--gold);display:block;}
.tc-tot-lbl{font-family:'Inconsolata',monospace;font-size:9px;letter-spacing:.12em;color:rgba(255,255,255,.35);}
.tc-avgs{display:grid;grid-template-columns:repeat(3,1fr);background:#f0ece3;border-bottom:1px solid var(--border);}
.tc-avg{padding:10px 14px;text-align:center;border-right:1px solid var(--border);}
.tc-avg:last-child{border-right:none;}
.tc-avg-val{font-family:'Oswald',sans-serif;font-size:17px;font-weight:700;}
.tc-avg-lbl{font-family:'Inconsolata',monospace;font-size:9px;letter-spacing:.12em;color:var(--muted);margin-top:2px;}
.tc-member{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--faint);}
.tc-member:last-child{border-bottom:none;}
.tc-m-name{font-family:'Oswald',sans-serif;font-size:15px;font-weight:500;flex:1;}
.tc-m-stats{font-family:'Inconsolata',monospace;font-size:10px;color:var(--muted);text-align:right;flex:1;}
.tc-m-score{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;color:var(--gold);min-width:50px;text-align:right;}
.tc-m-score span{font-family:'Inconsolata',monospace;font-size:9px;color:var(--muted);margin-left:2px;}
.team-lbl{font-family:'Inconsolata',monospace;font-size:11px;letter-spacing:.25em;color:var(--muted);margin:24px 0 10px;}

@media(max-width:700px){
  .ts-header,.ts-row{grid-template-columns:30px 1fr 80px 70px;}
  .ts-header .hm,.ts-row .hm{display:none;}
  .tc-avgs{grid-template-columns:1fr 1fr;}
  .tc-avg:last-child{grid-column:1/-1;border-top:1px solid var(--border);border-right:none;}
  .tc-m-stats{font-size:9px;}
}

/* HOW TO WIN */
.htw-hero{background:var(--text);color:#fff;padding:28px 24px;margin-bottom:16px;}
.htw-hero-eye{font-family:'Inconsolata',monospace;font-size:11px;letter-spacing:.3em;color:rgba(255,255,255,.4);margin-bottom:6px;}
.htw-hero-title{font-family:'Oswald',sans-serif;font-size:clamp(28px,6vw,48px);font-weight:700;line-height:1.1;margin-bottom:10px;}
.htw-hero-title span{color:var(--gold);}
.htw-hero-sub{font-family:'Barlow',sans-serif;font-size:15px;color:rgba(255,255,255,.65);line-height:1.6;max-width:560px;}
.htw-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
@media(max-width:640px){.htw-cards{grid-template-columns:1fr;}}
.htw-card{padding:20px;border:2px solid var(--faint);}
.htw-card-weight{font-family:'Oswald',sans-serif;font-size:42px;font-weight:700;line-height:1;}
.htw-card-label{font-family:'Inconsolata',monospace;font-size:10px;letter-spacing:.25em;color:var(--muted);margin:4px 0 10px;}
.htw-card-tip{font-family:'Barlow',sans-serif;font-size:13px;color:var(--text);line-height:1.55;}
.htw-card-tip strong{display:block;margin-bottom:3px;}
.htw-rule{background:#f0ece3;border:1px solid var(--border);padding:20px 24px;margin-bottom:8px;}
.htw-rule-title{font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;margin-bottom:8px;}
.htw-rule-body{font-family:'Barlow',sans-serif;font-size:14px;color:#444;line-height:1.65;}
.htw-rule-body strong{color:var(--text);}
.htw-example{background:var(--text);color:#fff;padding:20px 24px;margin-bottom:16px;}
.htw-example-title{font-family:'Inconsolata',monospace;font-size:10px;letter-spacing:.25em;color:rgba(255,255,255,.4);margin-bottom:12px;}
.htw-ex-row{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.08);padding:10px 0;flex-wrap:wrap;gap:6px;}
.htw-ex-row:last-child{border-bottom:none;}
.htw-ex-name{font-family:'Oswald',sans-serif;font-size:16px;font-weight:500;}
.htw-ex-stats{font-family:'Inconsolata',monospace;font-size:11px;color:rgba(255,255,255,.5);}
.htw-ex-score{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:var(--gold);}
.htw-cta{border:3px solid var(--text);padding:24px;text-align:center;}
.htw-cta-title{font-family:'Oswald',sans-serif;font-size:clamp(20px,4vw,30px);font-weight:700;margin-bottom:8px;}
.htw-cta-title span{color:var(--gold);}
.htw-cta-body{font-family:'Barlow',sans-serif;font-size:14px;color:var(--muted);line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">
<div class="header">
  <div class="eyebrow">SDR TEAM PERFORMANCE DASHBOARD</div>
  <div class="header-row"><h1 id="hMonth"></h1><div class="header-right" id="hMeta"></div></div>
</div>
<div class="metrics" id="metricCards"></div>
<div class="pace">
  <div class="pace-lbl">MONTHLY TEAM GOAL PACE</div>
  <div class="pace-row"><div class="pace-title" id="paceTitle"></div><div class="pace-stats" id="paceStats"></div></div>
  <div class="pbar-bg"><div class="pbar-fg" id="paceFill" style="width:0%"></div></div>
</div>
<div class="tabs">
  <button class="tab on" onclick="show('board',this)">🏆 Overall Rank</button>
  <button class="tab" onclick="show('teams',this)">👥 Teams</button>
  <button class="tab" onclick="show('howtowin',this)">🔥 How to Win</button>
</div>
<div id="board" class="sec on"></div>
<div id="teams" class="sec"></div>
<div id="howtowin" class="sec"></div>
<div class="footer"><div class="fl" id="footerL"></div><div class="fr">WHO'S NEXT?</div></div>
</div>

<script>
var DATA = {
  month:"March 2026", workDay:10, workDaysTotal:21, goal:1000000,
  updatedAt:"Thu Mar 12, 2026",
  reps:[
    {name:"Gloria",              rev:63000, cls:5,  sets:34, cc:25000},
    {name:"Kenny",               rev:53500, cls:5,  sets:33, cc:15000},
    {name:"Brent Jackman",       rev:31000, cls:2,  sets:6,  cc:0},
    {name:"Daniel Jordan",       rev:27166, cls:2,  sets:7,  cc:10500},
    {name:"Caroline",            rev:18400, cls:2,  sets:13, cc:0},
    {name:"Shivang Kapoor",      rev:16400, cls:2,  sets:16, cc:16400},
    {name:"Suraj Bali",          rev:15000, cls:4,  sets:9,  cc:11500},
    {name:"Petros Foustanellas", rev:13200, cls:2,  sets:4,  cc:0},
    {name:"Ben",                 rev:10000, cls:1,  sets:12, cc:0},
    {name:"Samuel Michalcin",    rev:10000, cls:1,  sets:10, cc:0},
    {name:"Jose Bernal",         rev:9000,  cls:4,  sets:7,  cc:5000},
    {name:"Jonathan Rolling",    rev:8385,  cls:1,  sets:13, cc:8385},
    {name:"Emery Sage",          rev:6200,  cls:1,  sets:25, cc:6200},
    {name:"Saray Cortes",        rev:6000,  cls:1,  sets:13, cc:1980},
    {name:"Harvey",              rev:6000,  cls:1,  sets:6,  cc:1980},
    {name:"Andy Perez",          rev:0,     cls:0,  sets:13, cc:0},
    {name:"TJ Miller",           rev:0,     cls:0,  sets:12, cc:0},
    {name:"Habib Fazli",         rev:0,     cls:0,  sets:6,  cc:0},
    {name:"Dante N",             rev:0,     cls:0,  sets:3,  cc:0}
  ]
};

var TEAMS = [
  {name:"Team 1", members:["Dante N","Jonathan Rolling"]},
  {name:"Team 2", members:["Brent Jackman","Jose Bernal","Daniel Jordan"]},
  {name:"Team 3", members:["TJ Miller"]},
  {name:"Team 4", members:["Gloria","Emery Sage","Kenny"]},
  {name:"Team 5", members:["Andy Perez"]},
  {name:"Team 6", members:["Caroline","Habib Fazli","Shivang Kapoor"]},
  {name:"Team 7", members:["Ben","Samuel Michalcin","Suraj Bali"]},
  {name:"Team 8", members:["Harvey","Petros Foustanellas","Saray Cortes"]}
];

function $(id){return document.getElementById(id);}
function fmt$(n){return(n||n===0)?'$'+Math.round(n).toLocaleString():'--';}
function fmtP(n){return n!=null?n.toFixed(1)+'%':'--';}
var RC=['var(--r1)','var(--r2)','var(--r3)'];
function rc(i){return RC[i]||'var(--muted)';}
function el(tag,cls,html){var e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;}
function show(id,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  $(id).classList.add('on');btn.classList.add('on');
}

// SCORING
var allReps=DATA.reps.map(function(r){return Object.assign({},r);});
var active=allReps.filter(function(r){return r.rev>0||r.cls>0||r.sets>0;});
var mR=Math.max.apply(null,active.map(function(r){return r.rev;}).concat([1]));
var mC=Math.max.apply(null,active.map(function(r){return r.cls;}).concat([1]));
var mS=Math.max.apply(null,active.map(function(r){return r.sets;}).concat([1]));

var scored=active.map(function(r){
  return {
    name:r.name,rev:r.rev,cls:r.cls,sets:r.sets,cc:r.cc,
    score:Math.round((r.rev/mR*100)*.35+(r.cls/mC*100)*.30+(r.sets/mS*100)*.35),
    rpc:r.cls>0?Math.round(r.rev/r.cls):null,
    cr:r.sets>0?r.cls/r.sets*100:null
  };
}).sort(function(a,b){return b.score-a.score||a.name.localeCompare(b.name);});

// also build a full map including zero-activity reps
var repMap={};
scored.forEach(function(r){repMap[r.name]=r;});
DATA.reps.forEach(function(r){
  if(!repMap[r.name]) repMap[r.name]={name:r.name,rev:0,cls:0,sets:0,cc:0,score:0,rpc:null,cr:null};
});

var totRev=scored.reduce(function(s,r){return s+r.rev;},0);
var totCls=scored.reduce(function(s,r){return s+r.cls;},0);
var totSet=scored.reduce(function(s,r){return s+r.sets;},0);
var pct=totRev/DATA.goal*100;
var dLeft=DATA.workDaysTotal-DATA.workDay;
var needed=dLeft>0?Math.ceil((DATA.goal-totRev)/dLeft):0;

// HEADER
var parts=DATA.month.split(' ');
$('hMonth').innerHTML=parts[0]+' <span>'+parts[1]+'</span>';
$('hMeta').innerHTML=DATA.updatedAt.toUpperCase()+'<br>WORK DAY '+DATA.workDay+' OF '+DATA.workDaysTotal;

// METRIC CARDS
var mc=$('metricCards');
var activeClosers=scored.filter(function(r){return r.rev>0;}).length;
var avgRevPerRep=activeClosers>0?Math.round(totRev/activeClosers):0;
[['&#x1F4B0;','REVENUE MTD',fmt$(totRev),'linear-gradient(135deg,#7a5808,#c8960a)'],
 ['&#x1F91D;','CLOSES MTD',String(totCls),'linear-gradient(135deg,#8a2010,#c0392b)'],
 ['&#x1F4C5;','SETS MTD',String(totSet),'linear-gradient(135deg,#0a2a5a,#2980b9)'],
 ['&#x1F3AF;','AVG REV / REP',fmt$(avgRevPerRep),'linear-gradient(135deg,#2d0a5a,#7a30b9)']
].forEach(function(d){
  var c=el('div','mc');
  c.innerHTML='<div class="mc-top" style="background:'+d[3]+'"></div><div class="mc-lbl">'+d[0]+' '+d[1]+'</div><div class="mc-val">'+d[2]+'</div>';
  mc.appendChild(c);
});

// PACE
$('paceTitle').textContent=fmt$(totRev)+' of '+fmt$(DATA.goal);
var ps=$('paceStats');
[[pct.toFixed(1)+'%','ATTAINED'],[dLeft,'DAYS LEFT'],[fmt$(needed),'REV/DAY NEEDED']].forEach(function(d){
  ps.innerHTML+='<div><span class="ps-val">'+d[0]+'</span><span class="ps-lbl">'+d[1]+'</span></div>';
});
setTimeout(function(){$('paceFill').style.width=Math.min(pct,100)+'%';},100);

// OVERALL BOARD
var board=$('board');
scored.forEach(function(r,i){
  var pctS=scored[0].score>0?r.score/scored[0].score*100:0;
  var barC=i===0?'var(--r1)':i===1?'var(--r2)':i===2?'var(--r3)':'var(--text)';
  var gapTxt=i===0
    ?'<span style="color:var(--green)">&#9650; LEADING THE BOARD</span>'
    :'<span style="color:var(--red)">&#9650; '+(scored[i-1].score-r.score)+' pts to #'+i+' &nbsp;|&nbsp; '+fmt$(scored[i-1].rev-r.rev)+' rev gap</span>';
  var pillHtml=[
    [fmt$(r.rev),'REV','var(--gold)'],
    [r.cls+' cls','CLOSES','var(--red)'],
    [(r.sets||'--')+' sets','SETS','var(--blue)'],
    [r.rpc?fmt$(r.rpc):'--','REV/CL','#555'],
    [fmtP(r.cr),'CR','var(--green)']
  ].map(function(p){
    return '<div class="pill" style="border-left-color:'+p[2]+'"><span class="pv">'+p[0]+'</span><span class="pl">'+p[1]+'</span></div>';
  }).join('');
  var row=el('div','rr');
  row.style.animationDelay=(i*.04)+'s';
  row.innerHTML='<div class="rrank" style="color:'+rc(i)+'">'+(i+1)+'</div>'
    +'<div><div class="rname" style="color:'+rc(i)+'">'+r.name+'</div>'
    +'<div class="pills">'+pillHtml+'</div>'
    +'<div class="sbar-bg"><div class="sbar-fg" style="width:'+pctS+'%;background:'+barC+'"></div></div>'
    +'<div class="rgap">'+gapTxt+'</div></div>'
    +'<div><div class="rscore" style="color:'+rc(i)+'">'+r.score+'</div><div class="rslbl">SCORE</div></div>';
  board.appendChild(row);
});

// TEAMS TAB
(function(){
  var sec=$('teams');

  var teams=TEAMS.map(function(t){
    var mems=t.members.map(function(n){return repMap[n]||{name:n,rev:0,cls:0,sets:0,score:0};});
    var n=mems.length;
    var tRev=mems.reduce(function(s,r){return s+r.rev;},0);
    var tCls=mems.reduce(function(s,r){return s+r.cls;},0);
    var tSets=mems.reduce(function(s,r){return s+r.sets;},0);
    var tScore=mems.reduce(function(s,r){return s+r.score;},0);
    return {
      name:t.name, members:mems, n:n,
      totRev:tRev, totCls:tCls, totSets:tSets,
      avgScore:n>0?Math.round(tScore/n*10)/10:0,
      avgRev:n>0?Math.round(tRev/n):0,
      avgCls:n>0?Math.round(tCls/n*10)/10:0,
      avgSets:n>0?Math.round(tSets/n*10)/10:0
    };
  }).sort(function(a,b){return b.avgScore-a.avgScore||a.name.localeCompare(b.name);});

  // Standings table
  var hdr=el('div','ts-header');
  hdr.innerHTML='<div>#</div><div>TEAM</div><div class="hm" style="text-align:right">AVG REV/REP</div><div class="hm" style="text-align:right">AVG SETS</div><div style="text-align:right">AVG CLS</div><div style="text-align:right">AVG SCORE</div>';
  sec.appendChild(hdr);

  teams.forEach(function(t,i){
    var row=el('div','ts-row');
    row.style.animationDelay=(i*.05)+'s';
    var c=rc(i);
    row.innerHTML='<div class="ts-rank" style="color:'+c+'">'+(i+1)+'</div>'
      +'<div><div class="ts-name" style="color:'+c+'">'+t.name+'</div><div class="ts-reps">'+t.n+' rep'+(t.n!==1?'s':'')+'</div></div>'
      +'<div class="ts-val hm">'+fmt$(t.avgRev)+'</div>'
      +'<div class="ts-val hm">'+t.avgSets+'</div>'
      +'<div class="ts-val">'+t.avgCls+'</div>'
      +'<div class="ts-score" style="color:'+c+'">'+t.avgScore+'</div>';

  });

  // Team cards
  var lbl=el('div','team-lbl');lbl.textContent='TEAM BREAKDOWN';sec.appendChild(lbl);
  var cards=el('div','team-cards');

  teams.forEach(function(t,i){
    var c=rc(i);
    var card=el('div','tc');
    card.style.animationDelay=(i*.06)+'s';
    var mems=t.members.slice().sort(function(a,b){return b.score-a.score;});
    var memberHtml=mems.map(function(r){
      return '<div class="tc-member">'
        +'<div class="tc-m-name">'+r.name+'</div>'
        +'<div class="tc-m-stats">'+fmt$(r.rev)+' &nbsp;·&nbsp; '+r.cls+' cls &nbsp;·&nbsp; '+r.sets+' sets</div>'
        +'<div class="tc-m-score">'+r.score+'<span>pts</span></div>'
      +'</div>';
    }).join('');

    card.innerHTML=
      '<div class="tc-head">'
        +'<div class="tc-head-left"><div class="tc-title" style="color:'+c+'">#'+(i+1)+' &nbsp;'+t.name+'</div>'
        +'<div class="tc-badge">'+t.n+' REP'+(t.n!==1?'S':'')+' &nbsp;·&nbsp; AVG SCORE '+t.avgScore+'</div></div>'
        +'<div class="tc-totals">'
          +'<div class="tc-tot"><span class="tc-tot-val">'+fmt$(t.totRev)+'</span><span class="tc-tot-lbl">TOTAL REV</span></div>'
          +'<div class="tc-tot"><span class="tc-tot-val">'+t.totCls+'</span><span class="tc-tot-lbl">TOTAL CLS</span></div>'
          +'<div class="tc-tot"><span class="tc-tot-val">'+t.totSets+'</span><span class="tc-tot-lbl">TOTAL SETS</span></div>'
        +'</div>'
      +'</div>'
      +'<div class="tc-avgs">'
        +'<div class="tc-avg"><div class="tc-avg-val">'+fmt$(t.avgRev)+'</div><div class="tc-avg-lbl">AVG REV / REP</div></div>'
        +'<div class="tc-avg"><div class="tc-avg-val">'+t.avgCls+'</div><div class="tc-avg-lbl">AVG CLOSES / REP</div></div>'
        +'<div class="tc-avg"><div class="tc-avg-val">'+t.avgSets+'</div><div class="tc-avg-lbl">AVG SETS / REP</div></div>'
      +'</div>'
      +'<div>'+memberHtml+'</div>';
    cards.appendChild(card);
  });
  sec.appendChild(cards);
})();
