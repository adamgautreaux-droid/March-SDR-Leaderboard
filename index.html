<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDR Leaderboard — March 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inconsolata:wght@400;500;600&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f2eb;--border:#ddd9ce;--text:#1a1814;--muted:#9a9488;--faint:#e8e4db;
  --gold:#c8960a;--red:#c0392b;--green:#1a7a4a;--blue:#2980b9;
  --r1:#c8960a;--r2:#7a7a7a;--r3:#9a6030;
  --card-bg:#fff;
}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px 14px 40px;}
.wrap{max-width:920px;margin:0 auto;}

/* ── HEADER ── */
.header{border-bottom:3px solid var(--text);padding-bottom:14px;margin-bottom:18px;}
.eyebrow{font-family:'Inconsolata',monospace;font-size:11px;letter-spacing:.3em;color:var(--muted);margin-bottom:4px;}
.header-row{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:8px;}
h1{font-family:'Oswald',sans-serif;font-size:clamp(30px,7vw,58px);font-weight:700;line-height:1;}
h1 span{color:var(--gold);}
.header-right{text-align:right;font-family:'Inconsolata',monospace;font-size:11px;color:var(--muted);line-height:1.8;}

/* ── METRIC CARDS ── */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:6px;margin-bottom:6px;}
.mc{background:var(--text);padding:16px 18px;position:relative;overflow:hidden;}
.mc-top{position:absolute;top:0;left:0;right:0;height:3px;}
.mc-lbl{font-family:'Inconsolata',monospace;font-size:10px;letter-spacing:.2em;color:rgba(255,255,255,.4);margin-bottom:6px;}
.mc-val{font-family:'Oswald',sans-serif;font-size:clamp(24px,4.5vw,36px);font-weight:700;color:#fff;line-height:1;}

/* ── PACE BAR ── */
.pace{background:#f0ece3;border:1px solid var(--border);padding:14px 18px;margin-bottom:20px;}
.pace-lbl{font-family:'Inconsolata',monospace;font-size:10px;letter-spacing:.22em;color:var(--muted);margin-bottom:6px;}
.pace-row{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px;margin-bottom:8px;}
.pace-title{font-family:'Oswald',sans-serif;font-size:clamp(15px,3vw,20px);font-weight:600;}
.pace-stats{display:flex;gap:20px;flex-wrap:wrap;}
.ps-val{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:var(--gold);display:block;}
.ps-lbl{font-family:'Inconsolata',monospace;font-size:10px;letter-spacing:.13em;color:var(--muted);}
.pbar-bg{height:6px;background:var(--faint);border-radius:2px;}
.pbar-fg{height:100%;border-radius:2px;background:linear-gradient(90deg,#7a5808,var(--gold));transition:width 1s ease;}

/* ── SCORING KEY (always visible) ── */
.scoring-key{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
.sk-item{flex:1;min-width:80px;background:var(--text);padding:10px 12px;display:flex;align-items:center;gap:8px;}
.sk-num{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;}
.sk-lbl{font-family:'Inconsolata',monospace;font-size:9px;letter-spacing:.15em;color:rgba(255,255,255,.45);line-height:1.5;}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;}
.tab{cursor:pointer;background:transparent;border:none;border-bottom:3px solid transparent;font-family:'Inconsolata',monospace;font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;padding:10px 16px;color:var(--muted);transition:all .15s;margin-bottom:-1px;white-space:nowrap;}
.tab:hover,.tab.on{color:var(--text);}.tab.on{border-bottom-color:var(--gold);}
.sec{display:none;}.sec.on{display:block;}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── OVERALL BOARD ── */
.rep-card{
  border:1px solid var(--border);
  background:var(--card-bg);
  margin-bottom:8px;
  animation:fadeUp .4s ease forwards;
  opacity:0;
}
.rep-card.inactive{background:#faf9f6;border-color:var(--faint);}
.rep-card-top{display:grid;grid-template-columns:52px 1fr auto;gap:0 10px;padding:14px 16px 0;}
.rep-rank{font-family:'Oswald',sans-serif;font-size:30px;font-weight:700;line-height:1;padding-top:2px;}
.rep-name{font-family:'Oswald',sans-serif;font-size:21px;font-weight:600;line-height:1;margin-bottom:4px;}
.rep-team-tag{font-family:'Inconsolata',monospace;font-size:10px;letter-spacing:.15em;color:var(--muted);}
.rep-score-col{text-align:right;}
.rep-score{font-family:'Oswald',sans-serif;font-size:34px;font-weight:700;line-height:1;}
.rep-score-lbl{font-family:'Inconsolata',monospace;font-size:9px;letter-spacing:.15em;color:var(--muted);margin-top:2px;}

/* score bar */
.rep-bar-wrap{padding:8px 16px 0;}
.rep-bar-bg{height:4px;background:var(--faint);border-radius:2px;}
.rep-bar-fg{height:100%;border-radius:2px;transition:width .8s ease;}

/* stats row */
.rep-stats{display:flex;gap:0;padding:10px 16px;flex-wrap:wrap;}
.rep-stat{padding:4px 12px 4px 0;min-width:80px;}
.rep-stat:first-child{padding-left:0;}
.stat-val{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;}
.stat-lbl{font-family:'Inconsolata',monospace;font-size:9px;letter-spacing:.13em;color:var(--muted);}

/* gap / action row */
.rep-gap{padding:8px 16px 12px;border-top:1px solid var(--faint);}
.gap-behind{font-family:'Inconsolata',monospace;font-size:11px;color:var(--red);}
.gap-leading{font-family:'Inconsolata',monospace;font-size:11px;color:var(--green);}
.gap-action{font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;color:var(--text);margin-top:3px;}
.gap-action span{color:var(--gold);}

/* pace indicator */
.rep-pace{display:inline-block;font-family:'Inconsolata',monospace;font-size:10px;letter-spacing:.1em;padding:2px 7px;margin-left:8px;border-radius:2px;vertical-align:middle;}
.pace-on{background:#e8f5ee;color:var(--green);}
.pace-behind{background:#fdecea;color:var(--red);}

/* inactive state */
.rep-inactive-msg{padding:10px 16px 14px;font-family:'Barlow',sans-serif;font-size:13px;color:var(--muted);font-style:italic;}
.rep-inactive-action{font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;color:var(--text);margin-top:2px;}

/* ── TEAMS TAB ── */
.team-standings-wrap{margin-bottom:24px;}
.ts-title{font-family:'Inconsolata',monospace;font-size:11px;letter-spacing:.25em;color:var(--muted);margin-bottom:10px;}
.ts-card{
  display:grid;
  grid-template-columns:46px 1fr auto;
  gap:0 12px;
  background:var(--card-bg);
  border:1px solid var(--border);
  padding:14px 16px;
  margin-bottom:6px;
  animation:fadeUp .35s ease forwards;
  opacity:0;
  align-items:center;
}
.ts-rank{font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;}
.ts-name{font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;line-height:1;margin-bottom:4px;}
.ts-meta{font-family:'Inconsolata',monospace;font-size:10px;letter-spacing:.12em;color:var(--muted);}
.ts-avgs{display:flex;gap:16px;flex-wrap:wrap;margin-top:6px;}
.ts-avg{text-align:left;}
.ts-avg-val{font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;}
.ts-avg-lbl{font-family:'Inconsolata',monospace;font-size:9px;letter-spacing:.1em;color:var(--muted);}
.ts-score-wrap{text-align:right;}
.ts-score{font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;}
.ts-score-lbl{font-family:'Inconsolata',monospace;font-size:9px;letter-spacing:.13em;color:var(--muted);margin-top:2px;}
.ts-bar-row{grid-column:1/-1;margin-top:6px;}
.ts-bar-bg{height:3px;background:var(--faint);border-radius:2px;}
.ts-bar-fg{height:100%;border-radius:2px;transition:width .8s ease;}

/* team detail cards */
.team-detail-title{font-family:'Inconsolata',monospace;font-size:11px;letter-spacing:.25em;color:var(--muted);margin:20px 0 10px;}
.tc{border:1px solid var(--border);background:var(--card-bg);margin-bottom:10px;overflow:hidden;animation:fadeUp .4s ease forwards;opacity:0;}
.tc-head{background:var(--text);color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;}
.tc-title{font-family:'Oswald',sans-serif;font-size:19px;font-weight:700;}
.tc-badge{font-family:'Inconsolata',monospace;font-size:10px;letter-spacing:.18em;color:rgba(255,255,255,.38);margin-top:3px;}
.tc-totals{display:flex;gap:18px;flex-wrap:wrap;}
.tc-tot-val{font-family:'Oswald',sans-serif;font-size:17px;font-weight:700;color:var(--gold);display:block;}
.tc-tot-lbl{font-family:'Inconsolata',monospace;font-size:9px;letter-spacing:.1em;color:rgba(255,255,255,.32);}
.tc-avgs-row{display:grid;grid-template-columns:repeat(3,1fr);background:#f0ece3;border-bottom:1px solid var(--border);}
.tc-avg-cell{padding:9px 14px;text-align:center;border-right:1px solid var(--border);}
.tc-avg-cell:last-child{border-right:none;}
.tc-avg-val{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;}
.tc-avg-lbl{font-family:'Inconsolata',monospace;font-size:9px;letter-spacing:.1em;color:var(--muted);margin-top:1px;}
.tc-member{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--faint);}
.tc-member:last-child{border-bottom:none;}
.tc-m-name{font-family:'Oswald',sans-serif;font-size:14px;font-weight:500;flex:1;}
.tc-m-stats{font-family:'Inconsolata',monospace;font-size:10px;color:var(--muted);flex:1;text-align:right;}
.tc-m-score{font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;color:var(--gold);min-width:46px;text-align:right;}
.tc-m-score-lbl{font-family:'Inconsolata',monospace;font-size:9px;color:var(--muted);margin-left:2px;}

/* ── HOW TO WIN ── */
.htw-hero{background:var(--text);color:#fff;padding:26px 22px;margin-bottom:14px;}
.htw-hero-eye{font-family:'Inconsolata',monospace;font-size:11px;letter-spacing:.3em;color:rgba(255,255,255,.38);margin-bottom:5px;}
.htw-hero-title{font-family:'Oswald',sans-serif;font-size:clamp(26px,5.5vw,44px);font-weight:700;line-height:1.1;margin-bottom:8px;}
.htw-hero-title span{color:var(--gold);}
.htw-hero-sub{font-family:'Barlow',sans-serif;font-size:14px;color:rgba(255,255,255,.6);line-height:1.6;max-width:540px;}
.htw-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
@media(max-width:600px){.htw-cards{grid-template-columns:1fr;}}
.htw-card{padding:18px;border:2px solid var(--faint);}
.htw-card-weight{font-family:'Oswald',sans-serif;font-size:40px;font-weight:700;line-height:1;}
.htw-card-label{font-family:'Inconsolata',monospace;font-size:10px;letter-spacing:.22em;color:var(--muted);margin:4px 0 8px;}
.htw-card-tip{font-family:'Barlow',sans-serif;font-size:13px;color:var(--text);line-height:1.55;}
.htw-card-tip strong{display:block;margin-bottom:3px;}
.htw-rule{background:#f0ece3;border:1px solid var(--border);padding:18px 22px;margin-bottom:8px;}
.htw-rule-title{font-family:'Oswald',sans-serif;font-size:17px;font-weight:600;margin-bottom:7px;}
.htw-rule-body{font-family:'Barlow',sans-serif;font-size:14px;color:#444;line-height:1.65;}
.htw-rule-body strong{color:var(--text);}
.htw-example{background:var(--text);color:#fff;padding:18px 22px;margin-bottom:14px;}
.htw-example-title{font-family:'Inconsolata',monospace;font-size:10px;letter-spacing:.22em;color:rgba(255,255,255,.38);margin-bottom:10px;}
.htw-ex-row{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.07);padding:9px 0;flex-wrap:wrap;gap:4px;}
.htw-ex-row:last-child{border-bottom:none;}
.htw-ex-name{font-family:'Oswald',sans-serif;font-size:15px;font-weight:500;}
.htw-ex-stats{font-family:'Inconsolata',monospace;font-size:10px;color:rgba(255,255,255,.45);}
.htw-ex-score{font-family:'Oswald',sans-serif;font-size:21px;font-weight:700;color:var(--gold);}
.htw-cta{border:3px solid var(--text);padding:22px;text-align:center;}
.htw-cta-title{font-family:'Oswald',sans-serif;font-size:clamp(18px,4vw,28px);font-weight:700;margin-bottom:7px;}
.htw-cta-title span{color:var(--gold);}
.htw-cta-body{font-family:'Barlow',sans-serif;font-size:13px;color:var(--muted);line-height:1.6;}

/* ── FOOTER ── */
.footer{border-top:1px solid var(--border);margin-top:32px;padding-top:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.fl{font-family:'Inconsolata',monospace;font-size:11px;color:var(--muted);letter-spacing:.13em;}
.fr{font-family:'Oswald',sans-serif;font-size:14px;color:var(--muted);letter-spacing:.1em;}

/* ── MOBILE ── */
@media(max-width:600px){
  .rep-card-top{grid-template-columns:42px 1fr auto;}
  .rep-rank{font-size:24px;}
  .rep-name{font-size:18px;}
  .rep-score{font-size:28px;}
  .rep-stats{gap:0;}
  .rep-stat{min-width:60px;}
  .stat-val{font-size:14px;}
  .sk-item{min-width:60px;padding:8px 10px;}
  .sk-num{font-size:18px;}
  .ts-card{grid-template-columns:38px 1fr auto;}
  .ts-rank{font-size:22px;}
  .ts-score{font-size:22px;}
  .tc-avgs-row{grid-template-columns:1fr 1fr;}
  .tc-avg-cell:last-child{grid-column:1/-1;border-top:1px solid var(--border);border-right:none;}
  .tc-m-stats{font-size:9px;}
  .tabs{overflow-x:auto;}
}
</style>
</head>
<body>
<div class="wrap">

<div class="header">
  <div class="eyebrow">SDR PERFORMANCE DASHBOARD</div>
  <div class="header-row">
    <h1 id="hMonth"></h1>
    <div class="header-right" id="hMeta"></div>
  </div>
</div>

<div class="metrics" id="metricCards"></div>

<div class="pace">
  <div class="pace-lbl">MONTHLY TEAM GOAL PACE</div>
  <div class="pace-row">
    <div class="pace-title" id="paceTitle"></div>
    <div class="pace-stats" id="paceStats"></div>
  </div>
  <div class="pbar-bg"><div class="pbar-fg" id="paceFill" style="width:0%"></div></div>
</div>

<!-- SCORING KEY always visible -->
<div class="scoring-key" id="scoringKey"></div>

<div class="tabs">
  <button class="tab on" onclick="show('board',this)">🏆 Overall Rank</button>
  <button class="tab" onclick="show('teams',this)">👥 Teams</button>
  <button class="tab" onclick="show('howtowin',this)">🔥 How to Win</button>
</div>

<div id="board" class="sec on"></div>
<div id="teams" class="sec"></div>
<div id="howtowin" class="sec"></div>

<div class="footer">
  <div class="fl" id="footerL"></div>
  <div class="fr">WHO'S NEXT?</div>
</div>
</div>

<script>
var DATA = {
  month:"March 2026", workDay:21, workDaysTotal:21, goal:1000000,
  updatedAt:"Fri Mar 27, 2026",
  reps:[
    {name:"Kenny",               rev:175000, cls:13, sets:54, cc:15000},
    {name:"Gloria",              rev:161700, cls:13, sets:80, cc:25000},
    {name:"Brent Jackman",       rev:137750, cls:13, sets:35, cc:0},
    {name:"Petros Foustanellas", rev:59300,  cls:8,  sets:25, cc:0},
    {name:"Jesse Saunders",      rev:48000,  cls:6,  sets:44, cc:0},
    {name:"Harvey",              rev:35800,  cls:5,  sets:22, cc:0},
    {name:"Daniel Jordan",       rev:35166,  cls:3,  sets:12, cc:10500},
    {name:"Jose Bernal",         rev:35000,  cls:6,  sets:16, cc:5000},
    {name:"Caroline",            rev:27600,  cls:3,  sets:30, cc:0},
    {name:"Songo",               rev:27100,  cls:3,  sets:22, cc:0},
    {name:"Suraj Bali",          rev:25000,  cls:3,  sets:17, cc:11500},
    {name:"Saray Cortes",        rev:23000,  cls:4,  sets:20, cc:1980},
    {name:"Habib Fazli",         rev:21800,  cls:3,  sets:8,  cc:16400},
    {name:"Samuel Michalcin",    rev:20000,  cls:3,  sets:18, cc:0},
    {name:"Shivang Kapoor",      rev:16400,  cls:2,  sets:29, cc:16400},
    {name:"Ben",                 rev:15000,  cls:2,  sets:18, cc:0},
    {name:"Emery Sage",          rev:10000,  cls:1,  sets:49, cc:6200},
    {name:"Jonathan Rolling",    rev:8385,   cls:1,  sets:26, cc:8385},
    {name:"Andy Perez",          rev:0,      cls:0,  sets:28, cc:0},
    {name:"TJ Miller",           rev:0,      cls:0,  sets:26, cc:0},
    {name:"Dante N",             rev:0,      cls:0,  sets:16, cc:0},
    {name:"Tom",                 rev:0,      cls:0,  sets:3,  cc:0},
    {name:"Paolo Kuizon",        rev:0,      cls:0,  sets:5,  cc:0},
    {name:"Ian Hukom",           rev:0,      cls:0,  sets:1,  cc:0}
  ]
};

var TEAMS = [
  {name:"Team 1", members:["Dante N","Jonathan Rolling","Tom"]},
  {name:"Team 2", members:["Brent Jackman","Jose Bernal","Daniel Jordan"]},
  {name:"Team 3", members:["TJ Miller"]},
  {name:"Team 4", members:["Gloria","Emery Sage","Kenny"]},
  {name:"Team 5", members:["Andy Perez"]},
  {name:"Team 6", members:["Caroline","Habib Fazli","Shivang Kapoor","Songo","Paolo Kuizon"]},
  {name:"Team 7", members:["Ben","Samuel Michalcin","Suraj Bali","Ian Hukom"]},
  {name:"Team 9", members:["Jesse Saunders"]}
];

// KPI targets
var KPI_SETS_DAY = 5;
var KPI_CLS_WEEK = 4;
var KPI_REV_MONTH = 100000;

function $(id){return document.getElementById(id);}
function fmt$(n){return (n!=null&&n!=='')?'$'+Math.round(n).toLocaleString():'--';}
function fmtP(n){return n!=null?n.toFixed(1)+'%':'--';}
function el(tag,cls,html){var e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;}
var RC=['var(--r1)','var(--r2)','var(--r3)'];
function rc(i){return i<RC.length?RC[i]:'var(--muted)';}

function show(id,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  $(id).classList.add('on'); btn.classList.add('on');
}

// ── SCORING ──
var allReps = DATA.reps;
var active = allReps.filter(function(r){return r.rev>0||r.cls>0||r.sets>0;});
var mR = Math.max.apply(null, active.map(function(r){return r.rev;}).concat([1]));
var mC = Math.max.apply(null, active.map(function(r){return r.cls;}).concat([1]));
var mS = Math.max.apply(null, active.map(function(r){return r.sets;}).concat([1]));

function calcScore(r){
  return Math.round((r.rev/mR*100)*.35 + (r.cls/mC*100)*.30 + (r.sets/mS*100)*.35);
}

var scoredActive = active.map(function(r){
  return {
    name:r.name, rev:r.rev, cls:r.cls, sets:r.sets, cc:r.cc,
    score: calcScore(r),
    rpc: r.cls>0 ? Math.round(r.rev/r.cls) : null,
    cr:  r.sets>0 ? r.cls/r.sets*100 : null,
    inactive: false
  };
}).sort(function(a,b){return b.score-a.score || a.name.localeCompare(b.name);});

var inactive = allReps.filter(function(r){return r.rev===0&&r.cls===0&&r.sets===0;});
var scoredInactive = inactive.map(function(r){
  return {name:r.name,rev:0,cls:0,sets:0,cc:0,score:0,rpc:null,cr:null,inactive:true};
});

var allScored = scoredActive.concat(scoredInactive);

// Build repMap for team lookups
var repMap = {};
allScored.forEach(function(r){repMap[r.name]=r;});

var totRev = scoredActive.reduce(function(s,r){return s+r.rev;},0);
var totCls = scoredActive.reduce(function(s,r){return s+r.cls;},0);
var totSet = scoredActive.reduce(function(s,r){return s+r.sets;},0);
var pct = totRev/DATA.goal*100;
var dLeft = DATA.workDaysTotal - DATA.workDay;
var needed = dLeft>0 ? Math.ceil((DATA.goal-totRev)/dLeft) : 0;

// KPI pace helpers (based on workDay elapsed)
var daysElapsed = DATA.workDay;
var weeksElapsed = daysElapsed / 5;
function paceStatus(actual, target){
  var ratio = target>0 ? actual/target : 1;
  return ratio >= 0.85 ? 'on' : 'behind';
}
function kpiSetsTarget(){ return KPI_SETS_DAY * daysElapsed; }
function kpiClsTarget(){ return KPI_CLS_WEEK * weeksElapsed; }

// ── ACTION GAP HELPER ──
// Returns plain-language "what do you need to do to jump to the next rank"
function actionGap(r, prevRep){
  if(!prevRep) return null;
  var ptGap = prevRep.score - r.score;
  if(ptGap <= 0) return null;

  // Figure out which single action closes the gap most efficiently
  // Simulate: what if rep added X sets, how many needed?
  var setsNeededForTie = null;
  if(mS > 0){
    // score gain per set = .35 * (1/mS) * 100
    var gainPerSet = .35 * (100/mS);
    setsNeededForTie = gainPerSet > 0 ? Math.ceil(ptGap / gainPerSet) : null;
  }
  // What if rep added revenue (in $5k chunks)
  var revNeededForTie = null;
  if(mR > 0){
    var gainPerDollar = .35 * (100/mR);
    revNeededForTie = gainPerDollar > 0 ? Math.ceil(ptGap / gainPerDollar) : null;
  }
  // What if rep added a close
  var closeGain = mC > 0 ? .30 * (100/mC) : 0;
  var closesNeededForTie = closeGain > 0 ? Math.ceil(ptGap / closeGain) : null;

  // Pick the most actionable suggestion
  var suggestions = [];
  if(setsNeededForTie !== null && setsNeededForTie <= 20){
    suggestions.push(setsNeededForTie+' more set'+(setsNeededForTie!==1?'s':''));
  }
  if(closesNeededForTie !== null && closesNeededForTie <= 5){
    suggestions.push(closesNeededForTie+' more close'+(closesNeededForTie!==1?'s':''));
  }
  if(revNeededForTie !== null){
    suggestions.push(fmt$(revNeededForTie)+' more rev');
  }

  if(suggestions.length === 0) return ptGap+' pts gap';
  // Show the top 2 most actionable
  return 'Jump to #'+(scoredActive.indexOf(prevRep)+1)+': <span>'+suggestions.slice(0,2).join(' or ')+'</span>';
}
